<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxStore_1</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#1a1a1a;color:#fff;font-family:Arial,sans-serif;min-height:100vh;padding-bottom:70px;}
        .screen{display:none;padding:15px;max-width:500px;margin:0 auto;}
        .screen.active{display:block;}
        .box{background:#2d2d2d;border-radius:16px;padding:25px;text-align:center;margin-top:30px;}
        .box h1{font-size:2em;margin:10px 0;}.box .logo{font-size:4em;}
        input,textarea,select{display:block;width:100%;margin:10px 0;padding:12px;border-radius:10px;border:2px solid #444;background:#111;color:#fff;font-size:1em;}
        input:focus,textarea:focus,select:focus{border-color:#ff6700;outline:none;}
        .btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;font-size:1em;font-weight:bold;margin:8px 0;text-align:center;}
        .btn-o{background:#ff6700;color:#fff;}.btn-o:active{background:#e55d00;}
        .btn-g{background:#00c853;color:#fff;}
        .btn-b{background:#448aff;color:#fff;}
        .btn-r{background:#ff4444;color:#fff;}
        .btn-sm{padding:8px 14px;font-size:0.8em;display:inline;width:auto;}
        .err{color:#ff4444;font-size:0.85em;min-height:20px;margin:5px 0;}
        .ok{color:#00c853;font-size:0.85em;}

        /* شريط علوي */
        .topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 0 12px 0;flex-wrap:wrap;gap:8px;}
        .topbar h2{font-size:1.3em;}
        .topbar .userinfo{background:#2d2d2d;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:0.85em;}

        /* شريط سفلي */
        .bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:#2d2d2d;display:flex;justify-content:space-around;padding:8px;z-index:100;}
        .bottom button{background:none;border:none;color:#b3b3b3;cursor:pointer;font-size:0.7em;text-align:center;padding:5px;}
        .bottom button span{display:block;font-size:1.5em;}
        .bottom button.active{color:#ff6700;font-weight:bold;}

        /* بطاقة تطبيق */
        .appcard{background:#2d2d2d;border-radius:14px;padding:14px;margin:10px 0;}
        .appcard .row1{display:flex;gap:10px;align-items:flex-start;}
        .appcard .icon{width:50px;height:50px;border-radius:12px;background:#ff6700;display:flex;align-items:center;justify-content:center;font-size:1.5em;flex-shrink:0;}
        .appcard .info{flex:1;}
        .appcard h3{margin-bottom:2px;font-size:1em;}
        .appcard .pub{color:#ff6700;font-size:0.8em;cursor:pointer;}
        .appcard .desc{color:#ccc;font-size:0.8em;margin:3px 0;}
        .appcard .stars{color:#ffb300;font-size:0.9em;cursor:pointer;}
        .appcard .stars span{cursor:pointer;padding:0 2px;}
        .appcard .actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center;}

        .tag{background:#111;border:1px solid #444;color:#b3b3b3;padding:4px 10px;border-radius:20px;font-size:0.75em;display:inline-flex;align-items:center;gap:3px;cursor:pointer;}

        /* قائمة منسدلة */
        .dropdown{background:#2d2d2d;border-radius:10px;max-height:180px;overflow-y:auto;border:1px solid #444;display:none;margin:5px 0;}
        .dropdown .item{padding:10px;cursor:pointer;border-bottom:1px solid #333;display:flex;justify-content:space-between;}
        .dropdown .item:hover{background:#3a3a3a;}

        /* منبثقة */
        .overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:200;justify-content:center;align-items:center;padding:15px;}
        .overlay.show{display:flex;}
        .popup{background:#2d2d2d;border-radius:16px;padding:20px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto;text-align:right;}

        hr{border-color:#333;margin:12px 0;}
        .idtag{background:#444;color:#b3b3b3;font-size:0.7em;padding:2px 7px;border-radius:8px;}
        .catrow{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap;}
        .catrow span{padding:7px 14px;border-radius:20px;background:#333;cursor:pointer;font-size:0.85em;}
        .catrow span.active{background:#ff6700;font-weight:bold;}
        .searchrow{display:flex;gap:6px;margin:10px 0;}
        .searchrow input{flex:1;padding:10px;border-radius:10px;border:2px solid #444;background:#111;color:#fff;}
        .searchrow select{padding:10px;border-radius:10px;border:2px solid #444;background:#111;color:#fff;min-width:80px;}
    </style>
</head>
<body>

<!-- ====== دخول ====== -->
<div id="loginScr" class="screen active">
    <div class="box">
        <div class="logo">🦊</div>
        <h1>FoxStore</h1>
        <input type="email" id="logEmail" placeholder="البريد الإلكتروني" dir="ltr">
        <input type="password" id="logPass" placeholder="كلمة السر">
        <p class="err" id="logErr"></p>
        <button class="btn btn-o" onclick="login()">🚀 دخول</button>
        <button class="btn" style="background:transparent;border:2px solid #ff6700;color:#ff6700;" onclick="showReg()">✨ حساب جديد</button>
    </div>
</div>

<!-- ====== تسجيل ====== -->
<div id="regScr" class="screen">
    <div class="box">
        <div class="logo">🦊</div>
        <h2>حساب جديد</h2>
        <input type="text" id="regName" placeholder="اسم المستخدم">
        <input type="email" id="regEmail" placeholder="البريد الإلكتروني" dir="ltr">
        <input type="password" id="regPass" placeholder="كلمة السر">
        <p class="err" id="regErr"></p>
        <button class="btn btn-o" onclick="register()">✅ تسجيل</button>
        <button class="btn" style="background:transparent;border:2px solid #ff6700;color:#ff6700;" onclick="showLog()">⬅ عندي حساب</button>
    </div>
</div>

<!-- ====== المتجر ====== -->
<div id="storeScr" class="screen">
    <div class="topbar">
        <h2>🦊 FoxStore</h2>
        <div class="userinfo" onclick="goTo('profile')"><span id="hName">---</span></div>
    </div>
    <div class="searchrow">
        <input type="text" id="sText" placeholder="🔍 بحث..." oninput="showApps()">
        <select id="sCat" onchange="showApps()">
            <option value="all">الكل</option>
            <option value="games">🎮 ألعاب</option>
            <option value="tools">🛠️ أدوات</option>
            <option value="other">📦 أخرى</option>
        </select>
    </div>
    <div class="catrow">
        <span class="active" onclick="setCat('all',this)">الكل</span>
        <span onclick="setCat('games',this)">🎮 ألعاب</span>
        <span onclick="setCat('tools',this)">🛠️ أدوات</span>
        <span onclick="setCat('other',this)">📦 أخرى</span>
    </div>
    <div id="ownerPanel" style="background:#3d1a00;border:2px solid #ff6700;border-radius:14px;padding:12px;margin:10px 0;display:none;">
        <p style="color:#ff6700;font-weight:bold;">👑 لوحة المالك</p>
        <button class="btn btn-r btn-sm" onclick="goTo('ownerUsers')">إدارة المستخدمين</button>
        <button class="btn btn-r btn-sm" onclick="goTo('ownerApps')">إدارة التطبيقات</button>
        <button class="btn btn-r btn-sm" onclick="wipeAll()">⚠️ مسح الكل</button>
    </div>
    <div id="appsList"><p style="text-align:center;color:#b3b3b3;margin-top:25px;">📭 لا توجد تطبيقات</p></div>
</div>

<!-- ====== رفع ====== -->
<div id="uploadScr" class="screen">
    <div class="topbar"><h3>📤 رفع تطبيق</h3><button class="btn btn-sm" style="border:2px solid #ff6700;color:#ff6700;background:transparent;" onclick="goTo('store')">⬅ رجوع</button></div>
    <input type="text" id="appName" placeholder="اسم التطبيق *">
    <textarea id="appDesc" placeholder="وصف التطبيق" rows="3"></textarea>
    <select id="appCat"><option value="tools">🛠️ أدوات</option><option value="games">🎮 ألعاب</option><option value="other">📦 أخرى</option></select>
    <input type="url" id="appLink" placeholder="رابط التطبيق (اختياري)" dir="ltr">
    <p style="font-size:0.8em;color:#b3b3b3;margin-top:8px;">أو ارفع ملف APK:</p>
    <input type="file" id="appFile" accept=".apk,.zip">
    <button class="btn btn-o" onclick="uploadApp()">✅ نشر التطبيق</button>
    <p id="uplMsg" style="margin-top:8px;"></p>
</div>

<!-- ====== الملف الشخصي ====== -->
<div id="profileScr" class="screen">
    <div class="topbar"><h3>👤 حسابي</h3><button class="btn btn-sm" style="border:2px solid #ff6700;color:#ff6700;background:transparent;" onclick="goTo('store')">⬅ رجوع</button></div>
    <div class="box" style="text-align:right;">
        <p><strong id="pName"></strong> <span class="idtag" id="pId"></span></p>
        <p style="color:#b3b3b3;" id="pEmail"></p>
        <p style="color:#b3b3b3;" id="pRole"></p>
        <hr>
        <p>📦 تطبيقاتي: <strong id="pApps">0</strong></p>
        <p>❤️ إعجابات: <strong id="pLikes">0</strong></p>
        <p>⭐ تقييمي: <strong id="pRate">0</strong></p>
        <hr>
        <h4>⚙️ تعديل</h4>
        <input type="text" id="editName" placeholder="الاسم">
        <select id="editRole"><option value="user">👤 مستخدم</option><option value="developer">👨‍💻 مطور</option></select>
        <button class="btn btn-g btn-sm" onclick="updateProfile()">💾 حفظ</button>
        <hr>
        <h4>تطبيقاتي</h4>
        <div id="myApps"></div>
        <button class="btn btn-r btn-sm" onclick="logout()">🚪 خروج</button>
    </div>
</div>

<!-- ====== رسائل ====== -->
<div id="msgScr" class="screen">
    <div class="topbar"><h3>💬 الرسائل</h3><button class="btn btn-sm" style="border:2px solid #ff6700;color:#ff6700;background:transparent;" onclick="goTo('store')">⬅ رجوع</button></div>
    <input type="text" id="msgSearch" placeholder="🔍 ابحث عن مستخدم..." oninput="searchUsers()" autocomplete="off">
    <div class="dropdown" id="userDrop"></div>
    <p id="recLabel" style="color:#00c853;font-size:0.8em;margin:4px 0;"></p>
    <input type="hidden" id="recId">
    <textarea id="msgText" placeholder="اكتب رسالتك..." rows="2"></textarea>
    <button class="btn btn-o" onclick="sendMsg()">📨 إرسال</button>
    <hr>
    <div id="msgList"><p style="text-align:center;color:#b3b3b3;">📭 لا رسائل</p></div>
</div>

<!-- ====== إدارة المستخدمين ====== -->
<div id="ownerUsersScr" class="screen">
    <div class="topbar"><h3>👑 المستخدمين</h3><button class="btn btn-sm" style="border:2px solid #ff6700;color:#ff6700;background:transparent;" onclick="goTo('store')">⬅ رجوع</button></div>
    <input type="text" id="ouSearch" placeholder="🔍 بحث..." oninput="showOwnerUsers()">
    <div id="ouList"></div>
</div>

<!-- ====== إدارة التطبيقات ====== -->
<div id="ownerAppsScr" class="screen">
    <div class="topbar"><h3>📱 التطبيقات</h3><button class="btn btn-sm" style="border:2px solid #ff6700;color:#ff6700;background:transparent;" onclick="goTo('store')">⬅ رجوع</button></div>
    <input type="text" id="oaSearch" placeholder="🔍 بحث..." oninput="showOwnerApps()">
    <div id="oaList"></div>
</div>

<!-- ====== تأكيد حذف ====== -->
<div class="overlay" id="confirmOv">
    <div class="popup">
        <h3>⚠️ تأكيد</h3>
        <p id="confirmTxt"></p>
        <div style="display:flex;gap:8px;margin-top:12px;">
            <button class="btn btn-r btn-sm" id="confirmBtn">🗑️ حذف</button>
            <button class="btn btn-sm" style="border:2px solid #ff6700;color:#ff6700;background:transparent;" onclick="hideConfirm()">❌ إلغاء</button>
        </div>
    </div>
</div>

<!-- ====== شريط التنقل ====== -->
<div class="bottom" id="bottomNav" style="display:none;">
    <button class="active" onclick="goTo('store')"><span>🏪</span>المتجر</button>
    <button onclick="goTo('upload')"><span>📤</span>رفع</button>
    <button onclick="goTo('messages')"><span>💬</span>رسائل</button>
    <button onclick="goTo('profile')"><span>👤</span>حسابي</button>
</div>

<script>
// ================ البيانات ================
var OE='foxsd520@gmail.com', OP='Mackssmr', ON='Fox Owner', OI='FOX-0001';

// استرداد البيانات
var DB=null;
try{ DB=JSON.parse(localStorage.getItem('foxdb')); }catch(e){ DB=null; }
if(!DB||!DB.users||DB.users.length===0){
    DB={users:[{email:OE,password:OP,name:ON,role:'owner',id:OI}],apps:[],messages:[],likes:{},ratings:{}};
    localStorage.setItem('foxdb',JSON.stringify(DB));
}

var me=null;
try{ me=JSON.parse(sessionStorage.getItem('foxme')); }catch(e){ me=null; }

// ================ دوال ================
function save(){ localStorage.setItem('foxdb',JSON.stringify(DB)); }
function esc(t){ var d=document.createElement('span'); d.textContent=t; return d.innerHTML; }
function uid(){ return 'U'+Date.now().toString(36).slice(-6).toUpperCase(); }
function appId(){ return 'A'+Date.now()+Math.random().toString(36).slice(2,7); }
function userByEmail(e){ for(var i=0;i<DB.users.length;i++){ if(DB.users[i].email===e) return DB.users[i]; } return null; }
function userById(id){ for(var i=0;i<DB.users.length;i++){ if(DB.users[i].id===id) return DB.users[i]; } return null; }
function avgRate(aid){
    var r=DB.ratings[aid]; if(!r) return 0;
    var k=Object.keys(r); if(k.length===0) return 0;
    var s=0; k.forEach(function(x){s+=r[x];});
    return (s/k.length).toFixed(1);
}

// ================ تنقل ================
function goTo(p){
    var screens=['loginScr','regScr','storeScr','uploadScr','profileScr','msgScr','ownerUsersScr','ownerAppsScr'];
    for(var i=0;i<screens.length;i++) document.getElementById(screens[i]).classList.remove('active');
    
    if(p==='login'){ document.getElementById('loginScr').classList.add('active'); document.getElementById('bottomNav').style.display='none'; }
    else if(p==='register'){ document.getElementById('regScr').classList.add('active'); document.getElementById('bottomNav').style.display='none'; }
    else {
        if(p==='store') document.getElementById('storeScr').classList.add('active');
        else if(p==='upload') document.getElementById('uploadScr').classList.add('active');
        else if(p==='profile') document.getElementById('profileScr').classList.add('active');
        else if(p==='messages') document.getElementById('msgScr').classList.add('active');
        else if(p==='ownerUsers') document.getElementById('ownerUsersScr').classList.add('active');
        else if(p==='ownerApps') document.getElementById('ownerAppsScr').classList.add('active');
        document.getElementById('bottomNav').style.display='flex';
        
        // تحديث الهيدر
        if(me){ document.getElementById('hName').textContent='👋 '+me.name; }
        
        // لوحة المالك
        var op=document.getElementById('ownerPanel');
        if(op) op.style.display=(me&&me.email===OE&&p==='store')?'block':'none';
        
        // تحميل المحتوى
        if(p==='store') showApps();
        if(p==='profile') showProfile();
        if(p==='messages') showMessages();
        if(p==='ownerUsers') showOwnerUsers();
        if(p==='ownerApps') showOwnerApps();
        
        // تحديث أزرار الملاحة
        var btns=document.getElementById('bottomNav').querySelectorAll('button');
        btns.forEach(function(b){b.classList.remove('active');});
        if(p==='store') btns[0].classList.add('active');
        else if(p==='upload') btns[1].classList.add('active');
        else if(p==='messages') btns[2].classList.add('active');
        else if(p==='profile') btns[3].classList.add('active');
    }
}

function showLog(){ document.getElementById('regScr').classList.remove('active'); document.getElementById('loginScr').classList.add('active'); }
function showReg(){ document.getElementById('loginScr').classList.remove('active'); document.getElementById('regScr').classList.add('active'); }

// ================ دخول وتسجيل ================
function login(){
    var e=document.getElementById('logEmail').value.trim().toLowerCase();
    var p=document.getElementById('logPass').value;
    var u=userByEmail(e);
    if(!u||u.password!==p){ document.getElementById('logErr').textContent='❌ بيانات خاطئة'; return; }
    me=u; sessionStorage.setItem('foxme',JSON.stringify(u));
    goTo('store');
}
function register(){
    var n=document.getElementById('regName').value.trim();
    var e=document.getElementById('regEmail').value.trim().toLowerCase();
    var p=document.getElementById('regPass').value;
    if(!n||!e||!p){ document.getElementById('regErr').textContent='❌ كل الحقول مطلوبة'; return; }
    if(userByEmail(e)){ document.getElementById('regErr').textContent='❌ البريد مستخدم'; return; }
    var u={email:e,password:p,name:n,role:'user',id:uid()};
    DB.users.push(u); save();
    me=u; sessionStorage.setItem('foxme',JSON.stringify(u));
    goTo('store');
}
function logout(){
    me=null; sessionStorage.removeItem('foxme');
    document.getElementById('bottomNav').style.display='none';
    ['storeScr','uploadScr','profileScr','msgScr','ownerUsersScr','ownerAppsScr'].forEach(function(s){document.getElementById(s).classList.remove('active');});
    document.getElementById('loginScr').classList.add('active');
}

// ================ التطبيقات ================
function setCat(c,el){
    document.getElementById('sCat').value=c;
    var tags=document.querySelectorAll('.catrow span');
    tags.forEach(function(t){t.classList.remove('active');});
    el.classList.add('active');
    showApps();
}
function showApps(){
    var search=(document.getElementById('sText').value||'').toLowerCase();
    var cat=document.getElementById('sCat').value||'all';
    var apps=DB.apps.slice();
    if(cat!=='all') apps=apps.filter(function(a){return a.category===cat;});
    if(search){
        apps=apps.filter(function(a){
            var pub=userByEmail(a.publisherEmail);
            return a.name.toLowerCase().indexOf(search)!==-1||
                   (a.desc||'').toLowerCase().indexOf(search)!==-1||
                   a.publisher.toLowerCase().indexOf(search)!==-1||
                   (pub?pub.id.toLowerCase():'').indexOf(search)!==-1;
        });
    }
    var c=document.getElementById('appsList');
    if(apps.length===0){ c.innerHTML='<p style="text-align:center;color:#b3b3b3;margin-top:25px;">📭 لا توجد تطبيقات</p>'; return; }
    
    c.innerHTML=apps.map(function(a){
        var pub=userByEmail(a.publisherEmail);
        var pid=pub?pub.id:'???';
        var likes=(DB.likes[a.id]||[]).length;
        var liked=me&&DB.likes[a.id]&&DB.likes[a.id].indexOf(me.email)!==-1;
        var avg=avgRate(a.id);
        var myR=me&&DB.ratings[a.id]&&DB.ratings[a.id][me.email]||0;
        var catI=a.category==='games'?'🎮':a.category==='tools'?'🛠️':'📦';
        var canDel=me&&(me.email===OE||me.email===a.publisherEmail);
        
        var stars='';
        for(var i=1;i<=5;i++) stars+='<span style="color:'+(i<=myR?'#ffb300':'#555')+';" onclick="rateApp(\''+a.id+'\','+i+')">⭐</span>';
        
        return '<div class="appcard"><div class="row1"><div class="icon">'+catI+'</div><div class="info">'+
            '<h3>'+esc(a.name)+'</h3>'+
            '<span class="pub" onclick="showPub(\''+a.publisherEmail+'\')">👤 '+esc(a.publisher)+' <span class="idtag">'+esc(pid)+'</span></span>'+
            (a.desc?'<p class="desc">'+esc(a.desc)+'</p>':'')+
            '<div style="margin:4px 0;"><span style="color:#ffb300;">'+(avg>0?avg+' ⭐':'جديد')+'</span> <span style="color:#b3b3b3;font-size:0.7em;">('+(DB.ratings[a.id]?Object.keys(DB.ratings[a.id]).length:0)+')</span></div>'+
            '<div>'+stars+'</div>'+
            '</div></div>'+
            '<div class="actions">'+
            '<span class="tag" onclick="likeApp(\''+a.id+'\')">'+(liked?'❤️':'🤍')+' '+likes+'</span>'+
            '<span class="tag">📥 '+(a.downloads||0)+'</span>'+
            (a.link?'<a href="'+esc(a.link)+'" target="_blank" class="btn btn-b btn-sm" onclick="dlApp(\''+a.id+'\')">تحميل</a>':'')+
            (a.apkData?'<button class="btn btn-g btn-sm" onclick="dlAPK(\''+a.id+'\')">APK</button>':'')+
            (canDel?'<button class="btn btn-r btn-sm" onclick="delApp(\''+a.id+'\')">🗑️</button>':'')+
            '</div></div>';
    }).join('');
}

function uploadApp(){
    var n=document.getElementById('appName').value.trim();
    var d=document.getElementById('appDesc').value.trim();
    var cat=document.getElementById('appCat').value;
    var link=document.getElementById('appLink').value.trim();
    var file=document.getElementById('appFile').files[0];
    var msg=document.getElementById('uplMsg');
    if(!n){ msg.textContent='❌ اسم التطبيق مطلوب'; msg.style.color='red'; return; }
    
    var app={id:appId(),name:n,desc:d,category:cat,link:link||null,publisher:me.name,publisherEmail:me.email,publisherId:me.id,downloads:0,createdAt:new Date().toISOString()};
    
    function finish(){
        DB.apps.push(app);
        if(!DB.likes[app.id]) DB.likes[app.id]=[];
        if(!DB.ratings[app.id]) DB.ratings[app.id]={};
        save();
        msg.textContent='✅ تم النشر بنجاح!'; msg.style.color='green';
        document.getElementById('appName').value=''; document.getElementById('appDesc').value='';
        document.getElementById('appLink').value=''; document.getElementById('appFile').value='';
        setTimeout(function(){msg.textContent='';},3000);
    }
    
    if(file){
        var r=new FileReader();
        r.onload=function(ev){ app.apkData=ev.target.result; app.apkName=file.name; finish(); };
        r.readAsDataURL(file);
    } else { finish(); }
}

function rateApp(aid,r){ if(!DB.ratings[aid]) DB.ratings[aid]={}; DB.ratings[aid][me.email]=r; save(); showApps(); }
function likeApp(aid){
    if(!DB.likes[aid]) DB.likes[aid]=[];
    var i=DB.likes[aid].indexOf(me.email);
    if(i>-1) DB.likes[aid].splice(i,1); else DB.likes[aid].push(me.email);
    save(); showApps();
}
function dlApp(aid){ var a=DB.apps.find(function(x){return x.id===aid;}); if(a){a.downloads=(a.downloads||0)+1; save(); showApps();} }
function dlAPK(aid){
    var a=DB.apps.find(function(x){return x.id===aid;});
    if(a&&a.apkData){ a.downloads=(a.downloads||0)+1; save();
        var l=document.createElement('a'); l.href=a.apkData; l.download=a.apkName||'app.apk';
        document.body.appendChild(l); l.click(); document.body.removeChild(l); showApps();
    }
}
function showPub(email){
    var pub=userByEmail(email); if(!pub) return;
    var papps=DB.apps.filter(function(a){return a.publisherEmail===email;});
    var tl=0; papps.forEach(function(a){tl+=(DB.likes[a.id]||[]).length;});
    var ov=document.createElement('div'); ov.className='overlay show';
    ov.innerHTML='<div class="popup"><h3>👤 الناشر</h3><p><strong>'+esc(pub.name)+'</strong> <span class="idtag">'+esc(pub.id)+'</span></p><p style="color:#b3b3b3;">'+esc(pub.email)+'</p><p>📦 '+papps.length+' | ❤️ '+tl+'</p><h4 style="margin-top:10px;">تطبيقاته:</h4>'+papps.map(function(a){return '<p>📱 '+esc(a.name)+' ⭐'+avgRate(a.id)+'</p>';}).join('')+'<button class="btn btn-sm" style="border:2px solid #ff6700;color:#ff6700;background:transparent;margin-top:10px;" onclick="this.closest(\'.overlay\').remove()">إغلاق</button></div>';
    document.body.appendChild(ov);
    ov.addEventListener('click',function(e){if(e.target===ov) ov.remove();});
}

// ================ حذف ================
var delWhat=null, delVal=null;
function delApp(id){ delWhat='app'; delVal=id; var a=DB.apps.find(function(x){return x.id===id;}); document.getElementById('confirmTxt').textContent='حذف "'+(a?a.name:'')+'"؟'; document.getElementById('confirmOv').classList.add('show'); }
function delUser(email){ delWhat='user'; delVal=email; var u=userByEmail(email); document.getElementById('confirmTxt').textContent='حذف "'+(u?u.name:'')+'" وجميع بياناته؟'; document.getElementById('confirmOv').classList.add('show'); }
function hideConfirm(){ document.getElementById('confirmOv').classList.remove('show'); delWhat=null; delVal=null; }

document.getElementById('confirmBtn').onclick=function(){
    if(delWhat==='app'){
        DB.apps=DB.apps.filter(function(a){return a.id!==delVal;});
        delete DB.likes[delVal]; delete DB.ratings[delVal];
    } else if(delWhat==='user'){
        var em=delVal;
        DB.users=DB.users.filter(function(u){return u.email!==em;});
        DB.apps=DB.apps.filter(function(a){return a.publisherEmail!==em;});
        DB.messages=DB.messages.filter(function(m){return m.fromEmail!==em&&m.toEmail!==em;});
        for(var k in DB.likes){ DB.likes[k]=DB.likes[k].filter(function(e){return e!==em;}); }
        for(var k in DB.ratings){ if(DB.ratings[k][em]) delete DB.ratings[k][em]; }
    }
    save(); hideConfirm(); showApps(); showProfile(); showOwnerUsers(); showOwnerApps();
};

// ================ رسائل ================
function searchUsers(){
    var q=document.getElementById('msgSearch').value.trim().toLowerCase();
    var dd=document.getElementById('userDrop');
    if(!q){ dd.style.display='none'; return; }
    var users=DB.users.filter(function(u){return u.email!==me.email&&(u.name.toLowerCase().indexOf(q)!==-1||u.id.toLowerCase().indexOf(q)!==-1);});
    if(!users.length){ dd.innerHTML='<div class="item" style="color:#b3b3b3;">لا يوجد</div>'; dd.style.display='block'; return; }
    dd.innerHTML=users.map(function(u){return '<div class="item" onclick="pickUser(\''+u.id+'\')"><span>👤 '+esc(u.name)+' <span class="idtag">'+esc(u.id)+'</span></span><span style="color:#b3b3b3;">'+(u.role==='owner'?'👑':u.role==='developer'?'👨‍💻':'👤')+'</span></div>';}).join('');
    dd.style.display='block';
}
function pickUser(uid){
    var u=userById(uid); if(!u) return;
    document.getElementById('recId').value=uid;
    document.getElementById('recLabel').textContent='✅ إلى: '+u.name+' ('+u.id+')';
    document.getElementById('msgSearch').value=''; document.getElementById('userDrop').style.display='none';
}
function sendMsg(){
    var tid=document.getElementById('recId').value;
    var txt=document.getElementById('msgText').value.trim();
    if(!tid||!txt){ alert('اختر مستخدم واكتب رسالة'); return; }
    var rec=userById(tid); if(!rec){ alert('غير موجود'); return; }
    DB.messages.push({id:'M'+Date.now(),from:me.name,fromEmail:me.email,fromId:me.id,to:rec.name,toEmail:rec.email,toId:rec.id,text:txt,time:new Date().toISOString()});
    save();
    document.getElementById('msgText').value=''; document.getElementById('recId').value=''; document.getElementById('recLabel').textContent='';
    showMessages();
}
function showMessages(){
    var msgs=DB.messages.filter(function(m){return m.toEmail===me.email||m.fromEmail===me.email;}).reverse();
    var c=document.getElementById('msgList');
    if(!msgs.length){ c.innerHTML='<p style="text-align:center;color:#b3b3b3;">📭 لا رسائل</p>'; return; }
    c.innerHTML=msgs.map(function(m){return '<div style="background:#2d2d2d;padding:10px;border-radius:10px;margin:6px 0;"><p style="color:#ff6700;font-weight:bold;font-size:0.85em;">'+esc(m.from)+' <span class="idtag">'+esc(m.fromId||'')+'</span> → '+esc(m.to)+' <span class="idtag">'+esc(m.toId||'')+'</span></p><p>'+esc(m.text)+'</p><p style="color:#b3b3b3;font-size:0.7em;">'+new Date(m.time).toLocaleString('ar')+'</p></div>';}).join('');
}

// ================ ملف شخصي ================
function showProfile(){
    document.getElementById('pName').textContent=me.name;
    document.getElementById('pId').textContent=me.id;
    document.getElementById('pEmail').textContent='📧 '+me.email;
    document.getElementById('pRole').textContent='🎭 '+(me.role==='owner'?'👑 مالك':me.role==='developer'?'👨‍💻 مطور':'👤 مستخدم');
    document.getElementById('editName').value=me.name;
    document.getElementById('editRole').value=me.role;
    var myApps=DB.apps.filter(function(a){return a.publisherEmail===me.email;});
    document.getElementById('pApps').textContent=myApps.length;
    var tl=0; myApps.forEach(function(a){tl+=(DB.likes[a.id]||[]).length;});
    document.getElementById('pLikes').textContent=tl;
    var tr=0,rc=0;
    myApps.forEach(function(a){ var rat=DB.ratings[a.id]; if(rat){ var v=Object.values(rat); v.forEach(function(r){tr+=r;rc++;}); } });
    document.getElementById('pRate').textContent=rc>0?(tr/rc).toFixed(1):'0';
    var c=document.getElementById('myApps');
    if(!myApps.length){ c.innerHTML='<p style="color:#b3b3b3;">لا توجد</p>'; }
    else c.innerHTML=myApps.map(function(a){return '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #333;"><span>📱 '+esc(a.name)+'</span><button class="btn btn-r btn-sm" style="padding:3px 8px;font-size:0.7em;" onclick="delApp(\''+a.id+'\')">🗑️</button></div>';}).join('');
}
function updateProfile(){
    var nn=document.getElementById('editName').value.trim();
    if(!nn) return;
    var u=DB.users.find(function(x){return x.email===me.email;});
    if(u){ u.name=nn; if(u.role!=='owner') u.role=document.getElementById('editRole').value; }
    DB.apps.forEach(function(a){if(a.publisherEmail===me.email) a.publisher=nn;});
    me.name=nn; me.role=u.role; sessionStorage.setItem('foxme',JSON.stringify(me));
    save(); document.getElementById('hName').textContent='👋 '+me.name; showProfile();
    alert('✅ تم الحفظ');
}

// ================ إدارة المالك ================
function showOwnerUsers(){
    if(!me||me.email!==OE) return;
    var q=(document.getElementById('ouSearch').value||'').toLowerCase();
    var users=DB.users.filter(function(u){return u.email!==OE;});
    if(q) users=users.filter(function(u){return u.name.toLowerCase().indexOf(q)!==-1||u.id.toLowerCase().indexOf(q)!==-1;});
    var c=document.getElementById('ouList');
    if(!users.length){ c.innerHTML='<p style="color:#b3b3b3;text-align:center;">لا يوجد</p>'; return; }
    c.innerHTML=users.map(function(u){return '<div style="background:#2d2d2d;padding:10px;border-radius:10px;margin:6px 0;display:flex;justify-content:space-between;align-items:center;"><div><strong>'+esc(u.name)+'</strong> <span class="idtag">'+esc(u.id)+'</span><br><span style="color:#b3b3b3;font-size:0.8em;">'+esc(u.email)+' - '+u.role+'</span></div><button class="btn btn-r btn-sm" onclick="delUser(\''+u.email+'\')">🗑️</button></div>';}).join('');
}
function showOwnerApps(){
    if(!me||me.email!==OE) return;
    var q=(document.getElementById('oaSearch').value||'').toLowerCase();
    var apps=DB.apps.slice();
    if(q) apps=apps.filter(function(a){return a.name.toLowerCase().indexOf(q)!==-1||a.publisher.toLowerCase().indexOf(q)!==-1;});
    var c=document.getElementById('oaList');
    if(!apps.length){ c.innerHTML='<p style="color:#b3b3b3;text-align:center;">لا يوجد</p>'; return; }
    c.innerHTML=apps.map(function(a){return '<div style="background:#2d2d2d;padding:10px;border-radius:10px;margin:6px 0;display:flex;justify-content:space-between;align-items:center;"><div><strong>'+esc(a.name)+'</strong><br><span style="color:#b3b3b3;font-size:0.8em;">'+esc(a.publisher)+' <span class="idtag">'+(a.publisherId||'')+'</span></span></div><button class="btn btn-r btn-sm" onclick="delApp(\''+a.id+'\')">🗑️</button></div>';}).join('');
}
function wipeAll(){
    if(!confirm('⚠️ مسح كل البيانات؟')) return;
    if(!confirm('آخر تأكيد!')) return;
    DB={users:[{email:OE,password:OP,name:ON,role:'owner',id:OI}],apps:[],messages:[],likes:{},ratings:{}};
    save(); me=DB.users[0]; sessionStorage.setItem('foxme',JSON.stringify(me));
    goTo('store');
}

// ================ إغلاق القائمة ================
document.addEventListener('click',function(e){
    var dd=document.getElementById('userDrop');
    var inp=document.getElementById('msgSearch');
    if(dd&&inp&&!dd.contains(e.target)&&e.target!==inp) dd.style.display='none';
});

// ================ بدء ================
if(me){ goTo('store'); }
</script>
