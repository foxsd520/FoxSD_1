here<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxStore_1 🦊</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body{background:#1a1a1a;color:#fff;min-height:100vh;padding-bottom:70px;max-width:500px;margin:0 auto;}
        
        /* شاشات */
        .screen{display:none;padding:15px;}
        .screen.active{display:block;}

        /* مربع */
        .card{background:#2d2d2d;border-radius:16px;padding:20px;margin:10px 0;}
        .card.center{text-align:center;margin-top:30px;}

        /* إدخالات */
        input,textarea,select{display:block;width:100%;margin:8px 0;padding:12px;border-radius:10px;border:2px solid #444;background:#1a1a1a;color:#fff;font-size:0.95em;}
        input:focus,textarea:focus,select:focus{border-color:#ff6700;outline:none;}

        /* أزرار */
        .btn{display:inline-block;padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-size:0.9em;font-weight:bold;text-align:center;margin:3px;transition:0.2s;}
        .btn:active{transform:scale(0.95);}
        .btn-o{background:#ff6700;color:#fff;}
        .btn-g{background:#00c853;color:#fff;}
        .btn-b{background:#448aff;color:#fff;}
        .btn-r{background:#ff4444;color:#fff;}
        .btn-block{display:block;width:100%;padding:14px;margin:8px 0;}
        .btn-outline{background:transparent;border:2px solid #ff6700;color:#ff6700;}
        .btn-xs{padding:5px 10px;font-size:0.75em;}

        /* شريط علوي */
        .topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 0 15px;gap:8px;flex-wrap:wrap;}
        .topbar h2{font-size:1.3em;}
        .user-badge{background:#2d2d2d;padding:6px 12px;border-radius:20px;font-size:0.85em;cursor:pointer;}

        /* تصنيفات وبحث */
        .cats{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap;}
        .cats span{padding:7px 14px;border-radius:20px;background:#333;cursor:pointer;font-size:0.85em;}
        .cats span.active{background:#ff6700;font-weight:bold;}
        .search-row{display:flex;gap:6px;margin:8px 0;}
        .search-row input,.search-row select{padding:10px;border-radius:10px;border:2px solid #444;background:#1a1a1a;color:#fff;font-size:0.9em;width:100%;}

        /* بطاقة تطبيق */
        .app-card{background:#2d2d2d;border-radius:14px;padding:14px;margin:10px 0;}
        .app-card .top{display:flex;gap:10px;align-items:flex-start;}
        .app-card .icon{width:48px;height:48px;border-radius:12px;background:#ff6700;display:flex;align-items:center;justify-content:center;font-size:1.4em;flex-shrink:0;}
        .app-card .info{flex:1;min-width:0;}
        .app-card h3{font-size:1em;margin-bottom:3px;word-break:break-word;}
        .app-card .pub{color:#ff6700;font-size:0.8em;cursor:pointer;}
        .app-card .desc{color:#ccc;font-size:0.8em;margin:3px 0;word-break:break-word;}
        .app-card .stars-row{margin:3px 0;display:flex;gap:1px;}
        .app-card .stars-row button{background:none;border:none;font-size:1.3em;cursor:pointer;padding:0 1px;}
        .app-card .actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center;}
        .stat{display:inline-flex;align-items:center;gap:3px;background:#333;padding:5px 10px;border-radius:20px;font-size:0.8em;cursor:pointer;border:none;color:#b3b3b3;}

        /* شريط سفلي */
        .nav{position:fixed;bottom:0;left:0;right:0;background:#2d2d2d;display:flex;justify-content:space-around;padding:8px;z-index:100;max-width:500px;margin:0 auto;}
        .nav button{background:none;border:none;color:#b3b3b3;cursor:pointer;font-size:0.7em;text-align:center;padding:5px;}
        .nav button span{display:block;font-size:1.6em;}
        .nav button.active{color:#ff6700;font-weight:bold;}

        /* منسدلة */
        .dropdown{background:#2d2d2d;border-radius:10px;border:1px solid #444;max-height:200px;overflow-y:auto;display:none;margin:4px 0;}
        .dropdown .item{padding:10px 14px;border-bottom:1px solid #333;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
        .dropdown .item:hover{background:#3a3a3a;}

        /* منبثقة */
        .overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:200;justify-content:center;align-items:center;padding:15px;}
        .overlay.show{display:flex;}
        .popup{background:#2d2d2d;border-radius:16px;padding:20px;width:100%;max-width:400px;text-align:right;max-height:80vh;overflow-y:auto;}

        /* متنوع */
        .id-tag{background:#444;color:#b3b3b3;font-size:0.7em;padding:2px 8px;border-radius:8px;margin:0 4px;}
        .green{color:#00c853;}
        .red{color:#ff4444;}
        .muted{color:#b3b3b3;}
        .small{font-size:0.8em;}
        hr{border-color:#333;margin:10px 0;}
        .owner-box{background:#3d1a00;border:2px solid #ff6700;border-radius:14px;padding:12px;margin:10px 0;display:none;}
        .owner-box p{color:#ff6700;font-weight:bold;margin-bottom:6px;}
    </style>
</head>
<body>

<!-- ===== دخول ===== -->
<div id="loginScreen" class="screen active">
    <div class="card center">
        <h1 style="font-size:4em;">🦊</h1>
        <h2>FoxStore</h2>
        <p class="muted small">متجر التطبيقات</p>
        <input type="email" id="le" placeholder="البريد الإلكتروني">
        <input type="password" id="lp" placeholder="كلمة السر">
        <p id="leMsg" class="red small" style="min-height:18px;"></p>
        <button class="btn btn-o btn-block" onclick="doLogin()">🚀 دخول</button>
        <button class="btn btn-outline btn-block" onclick="show('register')">✨ حساب جديد</button>
    </div>
</div>

<!-- ===== تسجيل ===== -->
<div id="registerScreen" class="screen">
    <div class="card center">
        <h1 style="font-size:4em;">🦊</h1>
        <h2>حساب جديد</h2>
        <input type="text" id="rn" placeholder="اسم المستخدم">
        <input type="email" id="re" placeholder="البريد الإلكتروني">
        <input type="password" id="rp" placeholder="كلمة السر">
        <p id="reMsg" class="red small" style="min-height:18px;"></p>
        <button class="btn btn-o btn-block" onclick="doRegister()">✅ تسجيل</button>
        <button class="btn btn-outline btn-block" onclick="show('login')">⬅ عندي حساب</button>
    </div>
</div>

<!-- ===== المتجر ===== -->
<div id="storeScreen" class="screen">
    <div class="topbar">
        <h2>🦊 FoxStore</h2>
        <div class="user-badge" onclick="show('profile')"><span id="hn">---</span></div>
    </div>
    <div class="search-row">
        <input type="text" id="ss" placeholder="🔍 بحث..." oninput="loadApps()">
        <select id="sc" onchange="loadApps()"><option value="all">الكل</option><option value="games">🎮 ألعاب</option><option value="tools">🛠️ أدوات</option><option value="other">📦 أخرى</option></select>
    </div>
    <div class="cats">
        <span class="active" onclick="setCat('all',this)">الكل</span>
        <span onclick="setCat('games',this)">🎮 ألعاب</span>
        <span onclick="setCat('tools',this)">🛠️ أدوات</span>
        <span onclick="setCat('other',this)">📦 أخرى</span>
    </div>
    <div id="ownerBox" class="owner-box">
        <p>👑 لوحة المالك</p>
        <button class="btn btn-r btn-xs" onclick="show('ownerUsers')">المستخدمين</button>
        <button class="btn btn-r btn-xs" onclick="show('ownerApps')">التطبيقات</button>
        <button class="btn btn-r btn-xs" onclick="wipeAll()">⚠️ مسح الكل</button>
    </div>
    <div id="appsContainer"><p class="muted" style="text-align:center;margin-top:20px;">📭 لا توجد تطبيقات</p></div>
</div>

<!-- ===== رفع ===== -->
<div id="uploadScreen" class="screen">
    <div class="topbar"><h3>📤 رفع تطبيق</h3><button class="btn btn-outline btn-xs" onclick="show('store')">⬅ رجوع</button></div>
    <input type="text" id="an" placeholder="اسم التطبيق *">
    <textarea id="ad" placeholder="وصف التطبيق" rows="3"></textarea>
    <select id="ac"><option value="tools">🛠️ أدوات</option><option value="games">🎮 ألعاب</option><option value="other">📦 أخرى</option></select>
    <input type="url" id="al" placeholder="رابط (اختياري)">
    <p class="small muted mt-2">أو ملف APK:</p>
    <input type="file" id="af" accept=".apk,.zip">
    <button class="btn btn-o btn-block" onclick="doUpload()">✅ نشر</button>
    <p id="um" class="small" style="margin-top:6px;"></p>
</div>

<!-- ===== الملف الشخصي ===== -->
<div id="profileScreen" class="screen">
    <div class="topbar"><h3>👤 حسابي</h3><button class="btn btn-outline btn-xs" onclick="show('store')">⬅ رجوع</button></div>
    <div class="card">
        <p><strong id="pn"></strong> <span class="id-tag" id="pid"></span></p>
        <p class="muted small" id="pe"></p>
        <p class="muted small" id="pr"></p>
        <hr>
        <p class="small">📦 تطبيقات: <strong id="pt">0</strong></p>
        <p class="small">❤️ إعجابات: <strong id="pl">0</strong></p>
        <p class="small">⭐ تقييم: <strong id="pa">0</strong></p>
        <hr>
        <h4 class="small">⚙️ تعديل</h4>
        <input type="text" id="en" placeholder="الاسم">
        <select id="er"><option value="user">👤 مستخدم</option><option value="developer">👨‍💻 مطور</option></select>
        <button class="btn btn-g btn-xs" onclick="updateProfile()">💾 حفظ</button>
        <hr>
        <h4 class="small">تطبيقاتي</h4>
        <div id="ma"></div>
        <button class="btn btn-r btn-xs" onclick="logout()" style="margin-top:10px;">🚪 خروج</button>
    </div>
</div>

<!-- ===== رسائل ===== -->
<div id="messagesScreen" class="screen">
    <div class="topbar"><h3>💬 رسائل</h3><button class="btn btn-outline btn-xs" onclick="show('store')">⬅ رجوع</button></div>
    <input type="text" id="mu" placeholder="🔍 اسم أو ID المستخدم..." oninput="searchUsers()" autocomplete="off">
    <div class="dropdown" id="mud"></div>
    <p id="rl" class="green small" style="min-height:18px;"></p>
    <input type="hidden" id="ri">
    <textarea id="mt" placeholder="رسالتك..." rows="2"></textarea>
    <button class="btn btn-o btn-block" onclick="sendMsg()">📨 إرسال</button>
    <hr>
    <div id="ml"></div>
</div>

<!-- ===== إدارة مستخدمين ===== -->
<div id="ownerUsersScreen" class="screen">
    <div class="topbar"><h3>👑 مستخدمين</h3><button class="btn btn-outline btn-xs" onclick="show('store')">⬅ رجوع</button></div>
    <input type="text" id="ous" placeholder="🔍 بحث..." oninput="showOwnerUsers()">
    <div id="oul"></div>
</div>

<!-- ===== إدارة تطبيقات ===== -->
<div id="ownerAppsScreen" class="screen">
    <div class="topbar"><h3>📱 تطبيقات</h3><button class="btn btn-outline btn-xs" onclick="show('store')">⬅ رجوع</button></div>
    <input type="text" id="oas" placeholder="🔍 بحث..." oninput="showOwnerApps()">
    <div id="oal"></div>
</div>

<!-- ===== شريط سفلي ===== -->
<div id="nav" class="nav" style="display:none;">
    <button class="active" onclick="show('store')"><span>🏪</span>المتجر</button>
    <button onclick="show('upload')"><span>📤</span>رفع</button>
    <button onclick="show('messages')"><span>💬</span>رسائل</button>
    <button onclick="show('profile')"><span>👤</span>حسابي</button>
</div>

<!-- ===== تأكيد ===== -->
<div class="overlay" id="confirmOv">
    <div class="popup">
        <h3>⚠️ تأكيد</h3>
        <p id="ctx"></p>
        <div style="display:flex;gap:8px;margin-top:12px;"><button class="btn btn-r btn-xs" id="cbtn">🗑️ حذف</button><button class="btn btn-outline btn-xs" onclick="hideConfirm()">❌ إلغاء</button></div>
    </div>
</div>

<script>
// ===== بيانات =====
var OE='foxsd520@gmail.com',OP='Mackssmr',ON='Fox Owner',OI='FOX-0001';

function _g(k){ try{ var d=localStorage.getItem(k); return d?JSON.parse(d):null; }catch(e){return null;} }
function _s(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){ _fixLS(); } }
function _fixLS(){ try{ localStorage.setItem('_t','1'); localStorage.removeItem('_t'); }catch(e){ alert('⚠️ يرجى فتح الموقع مباشرة وليس من داخل تطبيق آخر'); } }

var DB=_g('fsdb');
if(!DB||!DB.users||DB.users.length===0){
    DB={users:[{email:OE,password:OP,name:ON,role:'owner',id:OI}],apps:[],messages:[],likes:{},ratings:{}};
    _s('fsdb',DB);
}
var ME=_g('fsme');
function saveDB(){ _s('fsdb',DB); }
function saveME(){ _s('fsme',ME); }

function uid(){return 'U'+Date.now().toString(36).slice(-6).toUpperCase()+Math.random().toString(36).slice(2,4).toUpperCase();}
function aid(){return 'A'+Date.now()+Math.random().toString(36).slice(2,7);}
function esc(t){var d=document.createElement('span');d.textContent=t;return d.innerHTML;}
function ube(e){for(var i=0;i<DB.users.length;i++)if(DB.users[i].email===e)return DB.users[i];return null;}
function ubi(id){for(var i=0;i<DB.users.length;i++)if(DB.users[i].id===id)return DB.users[i];return null;}
function avgR(aid){
    var r=DB.ratings[aid];if(!r)return 0;
    var k=Object.keys(r);if(k.length===0)return 0;
    var s=0;k.forEach(function(x){s+=r[x];});
    return (s/k.length).toFixed(1);
}

// ===== تنقل =====
var current='login';
function show(p){
    current=p;
    var screens=['loginScreen','registerScreen','storeScreen','uploadScreen','profileScreen','messagesScreen','ownerUsersScreen','ownerAppsScreen'];
    screens.forEach(function(id){var el=document.getElementById(id);if(el)el.classList.remove('active');});
    
    if(p==='login'){document.getElementById('loginScreen').classList.add('active');document.getElementById('nav').style.display='none';}
    else if(p==='register'){document.getElementById('registerScreen').classList.add('active');document.getElementById('nav').style.display='none';}
    else {
        var map={store:'storeScreen',upload:'uploadScreen',profile:'profileScreen',messages:'messagesScreen',ownerUsers:'ownerUsersScreen',ownerApps:'ownerAppsScreen'};
        if(map[p])document.getElementById(map[p]).classList.add('active');
        document.getElementById('nav').style.display='flex';
        
        if(ME)document.getElementById('hn').textContent='👋 '+ME.name;
        var ob=document.getElementById('ownerBox');
        if(ob)ob.style.display=(ME&&ME.email===OE&&p==='store')?'block':'none';
        
        var navs=document.getElementById('nav').querySelectorAll('button');
        navs.forEach(function(b){b.classList.remove('active');});
        if(p==='store')navs[0].classList.add('active');
        else if(p==='upload')navs[1].classList.add('active');
        else if(p==='messages')navs[2].classList.add('active');
        else if(p==='profile')navs[3].classList.add('active');
        
        if(p==='store')loadApps();
        if(p==='profile')loadProfile();
        if(p==='messages')loadMessages();
        if(p==='ownerUsers')showOwnerUsers();
        if(p==='ownerApps')showOwnerApps();
    }
}

function doLogin(){
    var e=document.getElementById('le').value.trim().toLowerCase();
    var p=document.getElementById('lp').value;
    var u=ube(e);
    if(!u||u.password!==p){document.getElementById('leMsg').textContent='❌ بيانات خاطئة';return;}
    ME=u;saveME();show('store');
}
function doRegister(){
    var n=document.getElementById('rn').value.trim();
    var e=document.getElementById('re').value.trim().toLowerCase();
    var p=document.getElementById('rp').value;
    if(!n||!e||!p){document.getElementById('reMsg').textContent='❌ مطلوب';return;}
    if(ube(e)){document.getElementById('reMsg').textContent='❌ البريد مستخدم';return;}
    var u={email:e,password:p,name:n,role:'user',id:uid()};
    DB.users.push(u);saveDB();ME=u;saveME();show('store');
}
function logout(){ME=null;_s('fsme',null);document.getElementById('nav').style.display='none';['storeScreen','uploadScreen','profileScreen','messagesScreen','ownerUsersScreen','ownerAppsScreen'].forEach(function(id){var el=document.getElementById(id);if(el)el.classList.remove('active');});document.getElementById('loginScreen').classList.add('active');}

// ===== تطبيقات =====
function setCat(c,el){document.getElementById('sc').value=c;var t=document.querySelectorAll('.cats span');t.forEach(function(x){x.classList.remove('active');});el.classList.add('active');loadApps();}

function loadApps(){
    var s=(document.getElementById('ss').value||'').toLowerCase();
    var c=document.getElementById('sc').value||'all';
    var apps=DB.apps.slice();
    if(c!=='all')apps=apps.filter(function(a){return a.category===c;});
    if(s){apps=apps.filter(function(a){var p=ube(a.publisherEmail);return a.name.toLowerCase().indexOf(s)!==-1||(a.desc||'').toLowerCase().indexOf(s)!==-1||a.publisher.toLowerCase().indexOf(s)!==-1||(p?p.id.toLowerCase():'').indexOf(s)!==-1;});}
    
    var cont=document.getElementById('appsContainer');
    if(!apps.length){cont.innerHTML='<p class="muted" style="text-align:center;margin-top:20px;">📭 لا توجد تطبيقات</p>';return;}
    
    cont.innerHTML=apps.map(function(a){
        var p=ube(a.publisherEmail),pid=p?p.id:'???';
        var lk=(DB.likes[a.id]||[]).length;
        var liked=ME&&DB.likes[a.id]&&DB.likes[a.id].indexOf(ME.email)!==-1;
        var av=avgR(a.id);
        var mr=ME&&DB.ratings[a.id]?DB.ratings[a.id][ME.email]||0:0;
        var ci=a.category==='games'?'🎮':a.category==='tools'?'🛠️':'📦';
        var cd=ME&&(ME.email===OE||ME.email===a.publisherEmail);
        var stars='';
        for(var i=1;i<=5;i++)stars+='<button style="color:'+(i<=mr?'#ffb300':'#555')+';" onclick="rate(\''+a.id+'\','+i+')">⭐</button>';
        return '<div class="app-card"><div class="top"><div class="icon">'+ci+'</div><div class="info"><h3>'+esc(a.name)+'</h3><span class="pub" onclick="showPub(\''+a.publisherEmail+'\')">👤 '+esc(a.publisher)+' <span class="id-tag">'+esc(pid)+'</span></span>'+(a.desc?'<p class="desc">'+esc(a.desc)+'</p>':'')+'<div style="margin:3px 0;"><span style="color:#ffb300;">'+(av>0?av+' ⭐':'جديد')+'</span> <span class="muted small">('+(DB.ratings[a.id]?Object.keys(DB.ratings[a.id]).length:0)+')</span></div><div class="stars-row">'+stars+'</div></div></div><div class="actions"><button class="stat" onclick="like(\''+a.id+'\')">'+(liked?'❤️':'🤍')+' '+lk+'</button><span class="stat">📥 '+(a.downloads||0)+'</span>'+(a.link?'<a href="'+esc(a.link)+'" target="_blank" class="btn btn-b btn-xs" onclick="dload(\''+a.id+'\')">تحميل</a>':'')+(a.apkData?'<button class="btn btn-g btn-xs" onclick="dlAPK(\''+a.id+'\')">APK</button>':'')+(cd?'<button class="btn btn-r btn-xs" onclick="delApp(\''+a.id+'\')">🗑️</button>':'')+'</div></div>';
    }).join('');
}

function doUpload(){
    var n=document.getElementById('an').value.trim();
    var d=document.getElementById('ad').value.trim();
    var c=document.getElementById('ac').value;
    var l=document.getElementById('al').value.trim();
    var f=document.getElementById('af').files[0];
    var m=document.getElementById('um');
    if(!n){m.textContent='❌ اسم التطبيق مطلوب';m.style.color='red';return;}
    var app={id:aid(),name:n,desc:d,category:c,link:l||null,publisher:ME.name,publisherEmail:ME.email,publisherId:ME.id,downloads:0,createdAt:new Date().toISOString()};
    function fin(){
        DB.apps.push(app);
        if(!DB.likes[app.id])DB.likes[app.id]=[];
        if(!DB.ratings[app.id])DB.ratings[app.id]={};
        saveDB();
        m.textContent='✅ تم النشر!';m.style.color='green';
        document.getElementById('an').value='';document.getElementById('ad').value='';document.getElementById('al').value='';document.getElementById('af').value='';
        setTimeout(function(){m.textContent='';},2500);
        loadApps();
    }
    if(f){var r=new FileReader();r.onload=function(e){app.apkData=e.target.result;app.apkName=f.name;fin();};r.readAsDataURL(f);}
    else{fin();}
}

function rate(id,v){if(!ME)return;if(!DB.ratings[id])DB.ratings[id]={};DB.ratings[id][ME.email]=v;saveDB();loadApps();}
function like(id){if(!ME)return;if(!DB.likes[id])DB.likes[id]=[];var i=DB.likes[id].indexOf(ME.email);if(i>-1)DB.likes[id].splice(i,1);else DB.likes[id].push(ME.email);saveDB();loadApps();}
function dload(id){var a=DB.apps.find(function(x){return x.id===id;});if(a){a.downloads=(a.downloads||0)+1;saveDB();loadApps();}}
function dlAPK(id){var a=DB.apps.find(function(x){return x.id===id;});if(a&&a.apkData){a.downloads=(a.downloads||0)+1;saveDB();var l=document.createElement('a');l.href=a.apkData;l.download=a.apkName||'app.apk';document.body.appendChild(l);l.click();document.body.removeChild(l);loadApps();}}

function showPub(em){
    var p=ube(em);if(!p)return;
    var pas=DB.apps.filter(function(a){return a.publisherEmail===em;});
    var tl=0;pas.forEach(function(a){tl+=(DB.likes[a.id]||[]).length;});
    var ov=document.createElement('div');ov.className='overlay show';
    ov.innerHTML='<div class="popup"><h3>👤 '+esc(p.name)+'</h3><p><span class="id-tag">'+esc(p.id)+'</span></p><p class="muted small">'+esc(p.email)+'</p><p class="small">📦 '+pas.length+' | ❤️ '+tl+'</p><h4 class="small" style="margin-top:8px;">تطبيقاته:</h4>'+pas.map(function(a){return '<p class="small">📱 '+esc(a.name)+' ⭐'+avgR(a.id)+'</p>';}).join('')+'<button class="btn btn-outline btn-xs" onclick="this.closest(\'.overlay\').remove()">إغلاق</button></div>';
    document.body.appendChild(ov);
    ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});
}

// ===== حذف =====
var dType=null,dVal=null;
function delApp(id){dType='app';dVal=id;var a=DB.apps.find(function(x){return x.id===id;});document.getElementById('ctx').textContent='حذف "'+(a?a.name:'')+'"؟';document.getElementById('confirmOv').classList.add('show');}
function delUser(em){dType='user';dVal=em;var u=ube(em);document.getElementById('ctx').textContent='حذف "'+(u?u.name:'')+'" وكل بياناته؟';document.getElementById('confirmOv').classList.add('show');}
function hideConfirm(){document.getElementById('confirmOv').classList.remove('show');dType=null;dVal=null;}
document.getElementById('cbtn').onclick=function(){
    if(dType==='app'){DB.apps=DB.apps.filter(function(a){return a.id!==dVal;});delete DB.likes[dVal];delete DB.ratings[dVal];}
    else if(dType==='user'){var em=dVal;DB.users=DB.users.filter(function(u){return u.email!==em;});DB.apps=DB.apps.filter(function(a){return a.publisherEmail!==em;});DB.messages=DB.messages.filter(function(m){return m.fromEmail!==em&&m.toEmail!==em;});for(var k in DB.likes)DB.likes[k]=DB.likes[k].filter(function(e){return e!==em;});for(var k in DB.ratings)if(DB.ratings[k][em])delete DB.ratings[k][em];}
    saveDB();hideConfirm();loadApps();loadProfile();showOwnerUsers();showOwnerApps();
};

// ===== رسائل =====
function searchUsers(){
    var q=document.getElementById('mu').value.trim().toLowerCase();
    var dd=document.getElementById('mud');
    if(!q){dd.style.display='none';return;}
    var us=DB.users.filter(function(u){return u.email!==ME.email&&(u.name.toLowerCase().indexOf(q)!==-1||u.id.toLowerCase().indexOf(q)!==-1);});
    if(!us.length){dd.innerHTML='<div class="item muted">لا يوجد</div>';dd.style.display='block';return;}
    dd.innerHTML=us.map(function(u){return '<div class="item" onclick="pickU(\''+u.id+'\')"><span>👤 '+esc(u.name)+' <span class="id-tag">'+esc(u.id)+'</span></span><span class="muted small">'+(u.role==='owner'?'👑':u.role==='developer'?'👨‍💻':'👤')+'</span></div>';}).join('');
    dd.style.display='block';
}
function pickU(id){var u=ubi(id);if(!u)return;document.getElementById('ri').value=id;document.getElementById('rl').textContent='✅ إلى: '+u.name+' ('+u.id+')';document.getElementById('mu').value='';document.getElementById('mud').style.display='none';}
function sendMsg(){
    var ti=document.getElementById('ri').value;
    var tx=document.getElementById('mt').value.trim();
    if(!ti||!tx){alert('اختر مستخدم واكتب رسالة');return;}
    var r=ubi(ti);if(!r){alert('غير موجود');return;}
    DB.messages.push({id:'M'+Date.now(),from:ME.name,fromEmail:ME.email,fromId:ME.id,to:r.name,toEmail:r.email,toId:r.id,text:tx,time:new Date().toISOString()});
    saveDB();
    document.getElementById('mt').value='';document.getElementById('ri').value='';document.getElementById('rl').textContent='';
    loadMessages();
}
function loadMessages(){
    var ms=DB.messages.filter(function(m){return m.toEmail===ME.email||m.fromEmail===ME.email;}).reverse();
    var c=document.getElementById('ml');
    if(!ms.length){c.innerHTML='<p class="muted" style="text-align:center;">📭 لا رسائل</p>';return;}
    c.innerHTML=ms.map(function(m){return '<div class="card" style="padding:10px;"><p style="color:#ff6700;font-weight:bold;" class="small">'+esc(m.from)+' <span class="id-tag">'+esc(m.fromId||'')+'</span> → '+esc(m.to)+' <span class="id-tag">'+esc(m.toId||'')+'</span></p><p class="small">'+esc(m.text)+'</p><p class="muted small" style="font-size:0.7em;">'+new Date(m.time).toLocaleString('ar')+'</p></div>';}).join('');
}

// ===== ملف شخصي =====
function loadProfile(){
    document.getElementById('pn').textContent=ME.name;
    document.getElementById('pid').textContent=ME.id;
    document.getElementById('pe').textContent='📧 '+ME.email;
    document.getElementById('pr').textContent='🎭 '+(ME.role==='owner'?'👑 مالك':ME.role==='developer'?'👨‍💻 مطور':'👤 مستخدم');
    document.getElementById('en').value=ME.name;
    document.getElementById('er').value=ME.role;
    var ma=DB.apps.filter(function(a){return a.publisherEmail===ME.email;});
    document.getElementById('pt').textContent=ma.length;
    var tl=0;ma.forEach(function(a){tl+=(DB.likes[a.id]||[]).length;});
    document.getElementById('pl').textContent=tl;
    var tr=0,rc=0;ma.forEach(function(a){var r=DB.ratings[a.id];if(r){var v=Object.values(r);v.forEach(function(rr){tr+=rr;rc++;});}});
    document.getElementById('pa').textContent=rc>0?(tr/rc).toFixed(1):'0';
    var c=document.getElementById('ma');
    if(!ma.length)c.innerHTML='<p class="muted small">لا توجد</p>';
    else c.innerHTML=ma.map(function(a){return '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #333;"><span class="small">📱 '+esc(a.name)+'</span><button class="btn btn-r" style="padding:3px 8px;font-size:0.7em;" onclick="delApp(\''+a.id+'\')">🗑️</button></div>';}).join('');
}
function updateProfile(){
    var nn=document.getElementById('en').value.trim();if(!nn)return;
    var u=DB.users.find(function(x){return x.email===ME.email;});
    if(u){u.name=nn;if(u.role!=='owner')u.role=document.getElementById('er').value;}
    DB.apps.forEach(function(a){if(a.publisherEmail===ME.email)a.publisher=nn;});
    ME.name=nn;ME.role=u.role;saveME();saveDB();
    document.getElementById('hn').textContent='👋 '+ME.name;loadProfile();alert('✅ تم');
}

// ===== إدارة =====
function showOwnerUsers(){
    if(!ME||ME.email!==OE)return;
    var q=(document.getElementById('ous').value||'').toLowerCase();
    var us=DB.users.filter(function(u){return u.email!==OE;});
    if(q)us=us.filter(function(u){return u.name.toLowerCase().indexOf(q)!==-1||u.id.toLowerCase().indexOf(q)!==-1;});
    var c=document.getElementById('oul');
    if(!us.length){c.innerHTML='<p class="muted" style="text-align:center;">لا يوجد</p>';return;}
    c.innerHTML=us.map(function(u){return '<div style="display:flex;justify-content:space-between;align-items:center;background:#2d2d2d;padding:10px;border-radius:10px;margin:6px 0;"><div><strong class="small">'+esc(u.name)+'</strong> <span class="id-tag">'+esc(u.id)+'</span><br><span class="muted small">'+esc(u.email)+' - '+u.role+'</span></div><button class="btn btn-r" style="padding:4px 10px;font-size:0.7em;" onclick="delUser(\''+u.email+'\')">🗑️</button></div>';}).join('');
}
function showOwnerApps(){
    if(!ME||ME.email!==OE)return;
    var q=(document.getElementById('oas').value||'').toLowerCase();
    var apps=DB.apps.slice();
    if(q)apps=apps.filter(function(a){return a.name.toLowerCase().indexOf(q)!==-1||a.publisher.toLowerCase().indexOf(q)!==-1;});
    var c=document.getElementById('oal');
    if(!apps.length){c.innerHTML='<p class="muted" style="text-align:center;">لا يوجد</p>';return;}
    c.innerHTML=apps.map(function(a){return '<div style="display:flex;justify-content:space-between;align-items:center;background:#2d2d2d;padding:10px;border-radius:10px;margin:6px 0;"><div><strong class="small">'+esc(a.name)+'</strong><br><span class="muted small">'+esc(a.publisher)+' <span class="id-tag">'+(a.publisherId||'')+'</span></span></div><button class="btn btn-r" style="padding:4px 10px;font-size:0.7em;" onclick="delApp(\''+a.id+'\')">🗑️</button></div>';}).join('');
}
function wipeAll(){
    if(!confirm('⚠️ مسح كل البيانات؟'))return;
    if(!confirm('آخر تأكيد!'))return;
    DB={users:[{email:OE,password:OP,name:ON,role:'owner',id:OI}],apps:[],messages:[],likes:{},ratings:{}};
    saveDB();ME=DB.users[0];saveME();show('store');
}

// ===== إغلاق منسدلة =====
document.addEventListener('click',function(e){
    var dd=document.getElementById('mud');
    var ip=document.getElementById('mu');
    if(dd&&ip&&!dd.contains(e.target)&&e.target!==ip)dd.style.display='none';
});

// ===== بدء =====
_fixLS();
if(ME)show('store');
</script>
